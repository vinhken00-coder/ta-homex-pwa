<div class="relative z-10 flex flex-col flex-1 px-margin-mobile pt-16 pb-12">
<!-- Logo & Branding Section -->
<header class="flex flex-col items-center text-center mb-stack-lg">
<div class="mb-6 flex justify-center items-center w-full"><img src="{{DATA:IMAGE:IMAGE_6}}" alt="TA HomeX Logo" class="w-48 h-auto object-contain drop-shadow-xl"></div>
<h1 class="font-display-lg text-headline-sm tracking-tight text-white mb-2">
          TA <span class="text-antique-gold">HOMEX</span>
</h1>
<p class="font-label-sm text-label-sm uppercase tracking-[0.2em] text-outline-variant">
          Smart Living • Smart Hospitality
        </p>
</header>
<!-- Welcome Text -->
<section class="mt-auto mb-10">
<h2 class="font-headline-lg text-headline-lg text-white mb-2">Welcome back</h2>
<p class="font-body-md text-body-md text-outline-variant">Sign in to continue your premium residential experience.</p>
</section>
<!-- Form Section -->
<section class="space-y-stack-md">
<!-- Input Group: Identifier -->
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-[20px]" data-icon="person">person</span>
</div>
<input class="w-full h-14 pl-12 pr-4 glass-input rounded-xl text-white placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-antique-gold/50 transition-all font-body-md text-body-md" placeholder="Phone number / Email" type="text">
</div>
<!-- Input Group: Password -->
<div class="relative">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline-variant text-[20px]" data-icon="lock">lock</span>
</div>
<input class="w-full h-14 pl-12 pr-12 glass-input rounded-xl text-white placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-antique-gold/50 transition-all font-body-md text-body-md" placeholder="Password" type="password">
<button class="absolute inset-y-0 right-4 flex items-center text-outline-variant">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="font-label-lg text-label-lg text-antique-gold hover:text-secondary-fixed transition-colors" href="#">Forgot password?</a>
</div>
<!-- Primary Action -->
<button class="w-full h-14 bg-antique-gold text-deep-navy font-headline-sm text-headline-sm rounded-xl shadow-lg hover:bg-secondary-fixed active:scale-[0.98] transition-all flex items-center justify-center gap-2">

        </button>
</section>

<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-antique-gold text-[18px]" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-sm text-label-sm text-outline-variant">Luxury experience</span>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-antique-gold text-[18px]" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>

</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-antique-gold text-[18px]" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="font-label-sm text-label-sm text-outline-variant">Smart living</span>
</div>
</section>

<p class="font-body-sm text-body-sm text-outline-variant">

</p>
